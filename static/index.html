<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hedera TradeRoot</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <img src="images/traderoot_logo.png" alt="Hedera TradeRoot" class="site-logo">
      <p class="site-tagline">Trade supplier directory for garden designers</p>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="map">Find Suppliers</button>
    <button class="tab-btn" data-tab="add">Add Supplier</button>
    <button class="tab-btn" data-tab="register">Register</button>
  </nav>

  <!-- ── Map / Browse tab ── -->
  <div id="tab-map" class="tab-pane active">
    <div class="map-toolbar">

      <div class="toolbar-search">
        <input id="supplier-search" type="search" placeholder="Search suppliers…" autocomplete="off">
      </div>

      <div class="toolbar-filter-row">
        <span class="filter-label">Type</span>
        <div id="type-pills" class="pill-group"></div>
        <div class="trade-filter-group" role="group" aria-label="Trade filter">
          <label class="trade-check">
            <input id="trade-filter-yes" type="checkbox" checked>
            Trade
          </label>
          <label class="trade-check">
            <input id="trade-filter-no" type="checkbox" checked>
            Non-trade
          </label>
        </div>
      </div>


      <div class="toolbar-filter-row">
        <span class="filter-label">County</span>
        <select id="map-area-filter">
          <option value="">All counties</option>
        </select>
        <label class="trade-check" title="Show county boundary outlines on the map">
          <input id="county-borders-toggle" type="checkbox" checked>
          County borders
        </label>
        <span id="county-hover-label" class="county-hover-label" aria-live="polite"></span>
      </div>

      <div class="toolbar-filter-row proximity-row">
        <input id="postcode-input" type="text" placeholder="Postcode (e.g. RH10 9RX)" autocomplete="off">
        <button id="postcode-btn" class="btn-primary">Search</button>
        <button id="geolocate-btn" class="btn-ghost">📍 My location</button>
        <button id="postcode-clear" class="btn-ghost" style="display:none">✕ Clear</button>
      </div>

      <div class="toolbar-filter-row" id="radius-row" style="display:none">
        <label for="radius-slider">Radius: <strong id="radius-label">25 mi</strong></label>
        <input id="radius-slider" type="range" min="5" max="100" value="25" step="5">
      </div>

    </div>
    <div id="map"></div>
    <div id="map-status"></div>
    <div id="map-results" class="results-list"></div>
  </div>

  <!-- ── Add Supplier tab ── -->
  <div id="tab-add" class="tab-pane">
    <h2>Add a Supplier</h2>
    <form id="add-form" class="form-card">
      <label>Business name *<input name="name" type="text" required></label>
      <label>Type *
        <select name="type" required>
          <option value="nursery">Nursery</option>
          <option value="garden_centre">Garden Centre</option>
          <option value="hard_landscaper">Hard Landscaper</option>
          <option value="soils_aggregates">Soils & Aggregates</option>
          <option value="timber">Timber</option>
          <option value="furniture">Furniture</option>
          <option value="lighting">Lighting</option>
          <option value="tools">Tools</option>
          <option value="other">Other</option>
        </select>
      </label>
      <label>Price band
        <select name="price_band">
          <option value="">—</option>
          <option value="budget">Budget</option>
          <option value="mid">Mid</option>
          <option value="premium">Premium</option>
        </select>
      </label>
      <label>Areas covered
        <select name="areas" id="add-areas" multiple></select>
      </label>
      <label>Website<input name="website" type="url" placeholder="https://"></label>
      <label>Phone<input name="phone" type="tel"></label>
      <label>Email<input name="email" type="email"></label>
      <label>Address<input name="address" type="text" placeholder="e.g. 125 Sydney St, London SW3 6NR"></label>
      <label>Postcode (for map pin)<input name="postcode" type="text" placeholder="e.g. SW1A 1AA"></label>
      <label>Notes<textarea name="notes" rows="3"></textarea></label>
      <button type="submit" class="btn-primary">Add Supplier</button>
      <p id="add-msg" class="form-msg"></p>
    </form>
  </div>

  <!-- ── Register tab ── -->
  <div id="tab-register" class="tab-pane">
    <h2>Register as a Designer</h2>
    <form id="register-form" class="form-card">
      <label>Your name *<input name="name" type="text" required></label>
      <label>Email *<input name="email" type="email" required></label>
      <label>Company<input name="company" type="text"></label>
      <button type="submit" class="btn-primary">Register</button>
      <p id="register-msg" class="form-msg"></p>
    </form>
  </div>

  <!-- ── Supplier detail modal ── -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-panel">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
